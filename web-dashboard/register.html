<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStep | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lexend:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-dark: #05162e;
            --gold: #e5c158;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
       
        body {
            font-family: 'Inter', sans-serif;
            background: var(--navy-dark);
            background-image: radial-gradient(circle at 15% 15%, rgba(229, 193, 88, 0.06) 0%, transparent 45%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--white);
            overflow: hidden;
        }

        .auth-card {
            width: 100%;
            max-width: 650px;
            height: 750px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 50px 45px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-area h1 { 
            font-family: 'Lexend', sans-serif; 
            font-size: 2.4rem; 
            color: var(--gold); 
        }
        .logo-area p { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
        }

        h2 {
            font-size: 1.15rem; 
            color: var(--gold); 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        .grid-2 { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        .span-2 { grid-column: span 2; }

        .input-group { margin-bottom: 18px; }
        .input-group label {
            display: block; 
            font-size: 0.7rem; 
            font-weight: 700;
            color: var(--gold); 
            margin-bottom: 8px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-group input {
            width: 100%; 
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px; 
            padding: 14px; 
            color: white; 
            font-size: 0.95rem;
        }
        .input-group input:focus { 
            border-color: var(--gold); 
            outline: none; 
            background: rgba(255, 255, 255, 0.12); 
        }

        .btn-main {
            width: 100%; 
            padding: 16px; 
            background: var(--gold);
            color: var(--navy-dark); 
            border: none; 
            border-radius: 10px;
            font-weight: 800; 
            font-size: 1.05rem; 
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .footer-link { 
            text-align: center; 
            margin-top: 35px; 
            font-size: 0.92rem; 
            color: var(--text-muted); 
        }
        .footer-link span { 
            color: var(--gold); 
            cursor: pointer; 
            font-weight: 700; 
            text-decoration: underline; 
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <header class="logo-area">
            <h1>SmartStep</h1>
            <p>Access Portal</p>
        </header>

        <div class="form-content">
            <h2>Register New Account</h2>
           
            <form onsubmit="event.preventDefault(); alert('Account created successfully! Redirecting to login...'); window.location.href='login.html';">
                <div class="grid-2">
                    <div class="input-group">
                        <label>First Name</label>
                        <input type="text" placeholder="First" required>
                    </div>
                    <div class="input-group">
                        <label>Last Name</label>
                        <input type="text" placeholder="Last" required>
                    </div>
                    <div class="input-group span-2">
                        <label>Mat ID</label>
                        <input type="text" placeholder="MAT-1234" required>
                    </div>
                    <div class="input-group span-2">
                        <label>Email Address</label>
                        <input type="email" placeholder="name@email.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••" required>
                    </div>
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" placeholder="••••" required>
                    </div>
                </div>
                <button type="submit" class="btn-main">Register Now</button>
            </form>
           
            <p class="footer-link">Already have an account? <span onclick="window.location.href='login.html'">Sign In</span></p>
        </div>
    </div>
</body>
</html>
