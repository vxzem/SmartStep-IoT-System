<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStep | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lexend:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-dark: #05162e;
            --gold: #e5c158;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --text-muted: #94a3b8;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
       
        body {
            font-family: 'Inter', sans-serif;
            background: var(--navy-dark);
            background-image: radial-gradient(circle at 15% 15%, rgba(229, 193, 88, 0.06) 0%, transparent 45%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--white);
            overflow: hidden;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(229, 193, 88, 0.3);
            border-radius: 20px;
            padding: 50px 45px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-area h1 { 
            font-family: 'Lexend', sans-serif; 
            font-size: 2.6rem; 
            color: var(--gold); 
            margin-bottom: 8px;
        }
        .logo-area p { 
            font-size: 0.82rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
        }

        .input-group { margin-bottom: 24px; }
        .input-group label {
            display: block; 
            font-size: 0.72rem; 
            font-weight: 700;
            color: var(--gold); 
            margin-bottom: 8px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-group input {
            width: 100%; 
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px; 
            padding: 15px; 
            color: white; 
            font-size: 1rem;
            transition: 0.3s;
        }
        .input-group input:focus { 
            border-color: var(--gold); 
            outline: none; 
            background: rgba(255, 255, 255, 0.12); 
            box-shadow: 0 0 15px rgba(229, 193, 88, 0.1);
        }

        .error-msg {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            color: #ff8080;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .btn-main {
            width: 100%; 
            padding: 16px; 
            background: var(--gold);
            color: var(--navy-dark); 
            border: none; 
            border-radius: 10px;
            font-weight: 800; 
            font-size: 1.05rem; 
            cursor: pointer;
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: 0.2s;
        }
        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 193, 88, 0.3);
        }

        .footer-link { 
            text-align: center; 
            margin-top: 30px; 
            font-size: 0.9rem; 
            color: var(--text-muted); 
        }
        .footer-link span { 
            color: var(--gold); 
            cursor: pointer; 
            font-weight: 700; 
            text-decoration: none; 
        }
        .footer-link span:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-card">
        <header class="logo-area">
            <h1>SmartStep</h1>
            <p>Access Portal</p>
        </header>

        <div id="errorMsg" class="error-msg">
            Invalid email or password.
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="name@email.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-main">Sign In</button>
        </form>
        
        <p class="footer-link">New operator? <span onclick="window.location.href='register.html'">Create Account</span></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkYdfeGF54YM9OgeZxbJ2nDgpHt9ApO7A",
            authDomain: "smartstep-8c1f3.firebaseapp.com",
            // ADD THIS EXACT LINE:
            databaseURL: "https://smartstep-8c1f3-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "smartstep-8c1f3",
            storageBucket: "smartstep-8c1f3.firebasestorage.app",
            messagingSenderId: "346600511575",
            appId: "1:346600511575:web:2b03397c11fb153ecaab12",
            measurementId: "G-8SPLQ1BHVR"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            errorMsg.style.display = 'none';

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    // FETCH ROLE FROM DATABASE
                    get(ref(db, 'users/' + user.uid)).then((snapshot) => {
                        if (snapshot.exists()) {
                            const userData = snapshot.val();
                            
                            // Redirect based on database role
                            if (userData.role === "admin") {
                                window.location.href = "dash.html";
                            } else {
                                window.location.href = "user-dash.html";
                            }
                        } else {
                            // If no role found, default to user dashboard
                            window.location.href = "user-dash.html";
                        }
                    }).catch((dbErr) => {
                        console.error("Database Error:", dbErr);
                        window.location.href = "user-dash.html"; 
                    });
                })
                .catch((error) => {
                    console.error("Auth Error:", error.code);
                    errorMsg.style.display = 'block';
                    if (error.code === 'auth/invalid-credential') {
                        errorMsg.innerText = "Invalid login credentials.";
                    } else {
                        errorMsg.innerText = "Error: " + error.message;
                    }
                });
        });
    </script>
</body>
</html>
