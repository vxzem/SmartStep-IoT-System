<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStep | Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-dark: #05162e;
            --navy-mid: #0a2447;
            --gold: #e5c158;
            --gold-soft: #fdf9ec;
            --white: #ffffff;
            --bg-slate: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--navy-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background */
        .bg-grid {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(229,193,88,0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(229,193,88,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridShift 20s linear infinite;
        }
        @keyframes gridShift { from { transform: translateY(0); } to { transform: translateY(60px); } }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }
        .glow-1 { width: 400px; height: 400px; background: rgba(229,193,88,0.08); top: -100px; right: -100px; }
        .glow-2 { width: 300px; height: 300px; background: rgba(10,36,71,0.6); bottom: -80px; left: -80px; }

        /* Login Card */
        .login-card {
            background: var(--white);
            border-radius: 24px;
            padding: 50px 45px;
            width: 420px;
            position: relative;
            z-index: 10;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(229,193,88,0.15);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-wrap { text-align: center; margin-bottom: 35px; }
        .logo { font-family: 'Lexend', sans-serif; color: var(--navy-dark); font-size: 1.8rem; }
        .logo span { color: var(--gold); }
        .logo-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }

        .tab-row { display: flex; background: var(--bg-slate); border-radius: 10px; padding: 4px; margin-bottom: 30px; }
        .tab { flex: 1; text-align: center; padding: 9px; border-radius: 7px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; color: var(--text-muted); }
        .tab.active { background: var(--white); color: var(--navy-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
        input[type="text"], input[type="password"], input[type="email"] {
            width: 100%; padding: 13px 16px; border-radius: 10px;
            border: 2px solid var(--border); font-family: 'Inter', sans-serif;
            font-size: 0.95rem; transition: 0.2s; outline: none; color: var(--text-main);
            background: var(--bg-slate);
        }
        input:focus { border-color: var(--navy-dark); background: var(--white); }

        .role-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .role-btn {
            padding: 12px; border-radius: 10px; border: 2px solid var(--border);
            cursor: pointer; text-align: center; transition: 0.2s; background: var(--bg-slate);
        }
        .role-btn.selected { border-color: var(--navy-dark); background: var(--gold-soft); }
        .role-btn .icon { font-size: 1.4rem; margin-bottom: 4px; }
        .role-btn .label { font-size: 0.75rem; font-weight: 700; color: var(--text-main); }

        .btn-login {
            width: 100%; padding: 15px; background: var(--navy-dark); color: var(--white);
            border: none; border-radius: 10px; font-family: 'Lexend', sans-serif;
            font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.2s;
            margin-top: 5px; letter-spacing: 0.5px;
        }
        .btn-login:hover { background: var(--navy-mid); transform: translateY(-1px); box-shadow: 0 8px 20px rgba(5,22,46,0.3); }

        .divider { text-align: center; color: var(--text-muted); font-size: 0.75rem; margin: 18px 0; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
        .divider::before { left: 0; } .divider::after { right: 0; }

        .security-note {
            text-align: center; margin-top: 20px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
            color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .error-msg { color: var(--danger); font-size: 0.8rem; margin-top: 8px; display: none; }
        .forgot { text-align: right; font-size: 0.78rem; color: var(--text-muted); margin-top: -10px; margin-bottom: 18px; cursor: pointer; }
        .forgot:hover { color: var(--navy-dark); }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>

    <div class="login-card">
        <div class="logo-wrap">
            <div class="logo">⚡ Smart<span>Step</span></div>
            <div class="logo-sub">NODE: ESP8266-031 · SECURE ACCESS</div>
        </div>

        <div class="tab-row">
            <div class="tab active" onclick="setTab('login', this)">Sign In</div>
            <div class="tab" onclick="setTab('register', this)">Register</div>
        </div>

        <!-- LOGIN FORM -->
        <div id="login-form">
            <div style="margin-bottom: 16px;">
                <p style="font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">Access Level</p>
                <div class="role-select">
                    <div class="role-btn selected" onclick="selectRole(this)">
                        <div class="icon">👤</div>
                        <div class="label">User</div>
                    </div>
                    <div class="role-btn" onclick="selectRole(this)">
                        <div class="icon">🛡️</div>
                        <div class="label">Admin</div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Username or Email</label>
                <input type="text" id="username" placeholder="e.g. jdelacruz@school.edu">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <div class="forgot" onclick="alert('Password reset link sent to your registered email.')">Forgot password?</div>
            <p class="error-msg" id="error-msg">⚠ Invalid credentials. Please try again.</p>
            <button class="btn-login" onclick="handleLogin()">Sign In to Dashboard</button>
        </div>

        <!-- REGISTER FORM -->
        <div id="register-form" style="display:none;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="e.g. Juan Dela Cruz">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="e.g. jdelacruz@school.edu">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Min. 8 characters">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Repeat password">
            </div>
            <button class="btn-login" onclick="alert('Registration submitted. Awaiting admin approval.')">Create Account</button>
        </div>

        <div class="security-note">
            <span class="dot"></span> Encrypted Session · SmartStep v1.3.0
        </div>
    </div>

    <script>
        function setTab(tab, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
        }

        function selectRole(el) {
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        }

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('error-msg');
            if (!u || !p) { err.style.display = 'block'; return; }
            err.style.display = 'none';
            // Demo: redirect to user dashboard
            window.location.href = 'user-dash.html';
        }
    </script>
</body>
</html>
